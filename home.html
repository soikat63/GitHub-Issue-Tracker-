<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- Font awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    
    <!-- Tailwind+Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    
    <!-- Css  -->
    <link rel="stylesheet" href="./Style/home.css">

    
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">

            <!-- Brand -->
            <div class="flex items-center gap-2.5 shrink-0">
                <div class="">
                    <i class="fa-brands fa-github text-3xl"></i>
                </div>
                <span class="font-bold text-gray-900 text-[15px] hidden sm:block">GitHub Issues Tracker</span>
            </div>

            <!-- Search + Button -->
            <div class="flex items-center gap-2 flex-1 max-w-xs sm:max-w-sm md:max-w-md">
                <div class="relative flex-1">
                    <i
                        class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400  text-xs pointer-events-none z-10"></i>
                        
                    <input id="searchInput" type="text" placeholder="Search issues..."
                        class="input input-bordered w-full h-9 pl-8 pr-3 text-sm bg-gray-50 border-gray-200 focus:outline-indigo-300 focus:border-indigo-400"
                        oninput="handleSearch(this.value)" />
                </div>
                <button onclick="handleSearch(document.getElementById('searchInput').value)"
                    class="btn bg-indigo-500 hover:bg-indigo-600 text-white border-none h-9 min-h-0 text-sm font-semibold px-4 shrink-0">
                    + New Issue
                </button>
            </div>

            <!-- Logout -->
            <button onclick="handleLogout()"
                class="btn btn-ghost btn-sm text-gray-500 hover:text-red-500 hover:bg-red-50 gap-2 border border-gray-200 hidden sm:flex">
                <i class="fa fa-right-from-bracket text-sm"></i>
                Logout
            </button>
            <!-- Mobile logout -->
            <button onclick="handleLogout()" class="sm:hidden text-gray-400 hover:text-red-500 transition">
                <i class="fa fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="max-w-[1440px] mx-auto px-4 sm:px-6 py-6">

        <!-- TAB CARD -->
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm mb-6">

            <!-- Tab Row -->
            <div class="flex items-center gap-1 px-4 pt-4 pb-3 border-b border-gray-100">
                <button class="tab-pill is-active" data-tab="all" onclick="switchTab('all')">All</button>
                <button class="tab-pill" data-tab="open" onclick="switchTab('open')">Open</button>
                <button class="tab-pill" data-tab="closed" onclick="switchTab('closed')">Closed</button>
            </div>

            <!-- Meta -->
            <div class="flex items-center justify-between px-5 py-3 gap-4 flex-wrap">
                <div class="flex items-center gap-3">
                    <div
                        class="w-9 h-9 rounded-full bg-indigo-50 border border-indigo-100 flex items-center justify-center shrink-0">
                        <i class="fa fa-bug text-indigo-400 text-sm"></i>
                    </div> 
                    <div>
                        <p id="issueCountText" class="text-sm font-bold text-gray-800">Loading...</p>
                        <p class="text-xs text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 text-xs font-semibold text-gray-500">
                    <span class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open
                    </span>
                    <span class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Closed
                    </span>
                </div>
            </div>
        </div>

        <!-- SPINNER -->
        <div id="loadingSpinner" class="flex flex-col items-center justify-center py-20 gap-3">
            <span class="loading loading-spinner loading-lg text-indigo-500"></span>
            <p class="text-sm text-gray-400">Fetching issues...</p>
        </div>

        <!-- GRID -->
        <div id="issuesGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

        <!-- EMPTY -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-gray-400 gap-3">
            <i class="fa fa-search text-5xl opacity-20"></i>
            <p class="text-sm">No issues found</p>
        </div>
    </div>

    <!-- MODAL -->
    <div id="issueModal"
        class="fixed inset-0 z-[300] hidden items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm"
        onclick="if(event.target===this) closeModal()">
        <div class="bg-white rounded-2xl w-full max-w-lg max-h-[88vh] overflow-y-auto shadow-2xl fade-up"
            onclick="event.stopPropagation()">
            <div class="p-6 pt-5">
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="./script/home.js"></script>
</body>

</html>
