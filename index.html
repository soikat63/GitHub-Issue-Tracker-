<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GitHub Issues Tracker</title>

    <!-- Font awesome CDN  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <!-- Tailwind+Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

        <!-- Css  -->
         <link rel="stylesheet" href="./Style/login.css">


</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">


    <div class="bg-white rounded-2xl p-8 w-full max-w-lg shadow-lg fade-up">

        <!-- Logo & Title -->
        <div class="flex flex-col items-center mb-7 text-center">
            <div class="mb-6">
                <i class="fa-brands fa-github text-8xl"></i>
            </div>
            <h1 class="text-2xl font-semibold text-gray-900">GitHub Issues Tracker</h1>
            <p class=" text-gray-400 mt-1">Sign in to manage your issues</p>
        </div>

        <!-- Username -->
        <div class="mb-4">
            <label class="block  text-gray-900 mb-2 font-medium">Username</label>
            <input id="username" type="text" placeholder="Enter Username" autocomplete="off"
                class="input input-bordered w-full h-12  bg-white focus:border-indigo-400 focus:outline-indigo-300" />
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="block text-gray-900 mb-2 font-medium">Password</label>
            <input id="password" type="password" placeholder="Enter Password"
                class="input input-bordered w-full h-12 bg-white focus:border-indigo-400 focus:outline-indigo-300" />
        </div>

        <!-- Error -->
        <p id="loginError" class="hidden text-red-500 text-xs mb-2">
            <i class="fa fa-exclamation-circle"></i> Invalid username or password
        </p>

        <!-- Sign In -->
        <button onclick="handleLogin()"
            class="btn w-full bg-primary hover:bg-indigo-600 text-white border-none h-12 min-h-0  font-semibold mt-1">
            Sign In
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-xs text-gray-400 font-medium">OR</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Demo Credentials -->
        <p class="text-sm text-center text-gray-400 mb-2.5   tracking-wide">Demo Credentials</p>
        <div class="bg-gray-50 rounded-md p-6 ">
            <div class="flex items-center justify-center gap-3">
                <div class=" text-gray-600 space-y-1">
                    <p class="font-bold text-center text-gray-900">Username: <span class="font-normal" >admin</span></p>
                    <p class="font-bold text-center text-gray-900">Password: <span class="font-normal" >admin123</span></p>
                </div>
                
            </div>
        </div>
    </div>

    <script src="./script/login.js"></script>
</body>
</html>
